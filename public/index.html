<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Presentismo</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- AG Grid -->
    <link href="https://cdn.jsdelivr.net/npm/ag-grid-community@31.0.0/styles/ag-grid.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/ag-grid-community@31.0.0/styles/ag-theme-balham.css" rel="stylesheet">

    <style>
        body { background-color: #f8f9fa; }
        .sidebar {
            width: 220px;
            min-height: 100vh;
            background-color: #1a2035;
            position: fixed;
            top: 0; left: 0;
        }
        .sidebar .nav-link {
            color: #adb5bd;
            padding: 12px 20px;
        }
        .sidebar .nav-link.active {
            color: #fff;
            background-color: #0d6efd;
            border-radius: 6px;
            margin: 0 10px;
        }
        .sidebar .logo {
            color: #fff;
            font-weight: bold;
            padding: 20px;
            font-size: 1rem;
            border-bottom: 1px solid #2d3a5a;
        }
        .main-content {
            margin-left: 220px;
            padding: 30px;
        }
        .page-title {
            background: linear-gradient(135deg, #1a2035, #2d3a5a);
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            margin-bottom: 25px;
        }
        #grid-resultados {
            height: 500px;
        }
        .badge-ok       { background-color: #198754; color: white; padding: 4px 10px; border-radius: 20px; }
        .badge-revisar  { background-color: #ffc107; color: black; padding: 4px 10px; border-radius: 20px; }
        .badge-fe       { background-color: #dc3545; color: white; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; }
        .badge-cmj      { background-color: #6f42c1; color: white; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; }
    </style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar d-flex flex-column">
    <div class="logo">⚡ Presentismo</div>
    <nav class="nav flex-column mt-3">
        <a href="#" class="nav-link active" onclick="mostrarSeccion('presentismo')">
            👥 Presentismo
        </a>
        <a href="#" class="nav-link" onclick="mostrarSeccion('reglas')">
            ⚙️ Reglas de Ausencias
        </a>
    </nav>
    <div class="mt-auto p-3">
        <a href="#" class="nav-link text-danger">↩ Salir</a>
    </div>
</div>

<!-- CONTENIDO PRINCIPAL -->
<div class="main-content">

    <!-- SECCIÓN PRESENTISMO -->
    <div id="seccion-presentismo">
        <div class="page-title">
            <h5 class="mb-0">⚡ PREMIO PRESENTISMO</h5>
        </div>

        <div class="row g-4 mb-4">
            <!-- Períodos -->
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h6 class="card-title mb-3">📅 SELECCIONAR PERÍODOS</h6>
                        <div class="mb-3">
                            <label class="form-label text-muted small">PERÍODO DE PRESENTISMO</label>
                            <div class="row g-2">
                                <div class="col">
                                    <input type="date" id="desde_pres" class="form-control" value="2026-01-01">
                                </div>
                                <div class="col">
                                    <input type="date" id="hasta_pres" class="form-control" value="2026-05-31">
                                </div>
                            </div>
                        </div>
                        <div>
                            <label class="form-label text-muted small">PERÍODO DE LIQUIDACIÓN</label>
                            <div class="row g-2">
                                <div class="col">
                                    <input type="date" id="desde_liq" class="form-control" value="2026-02-01">
                                </div>
                                <div class="col">
                                    <input type="date" id="hasta_liq" class="form-control" value="2026-02-28">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Archivos -->
            <div class="col-md-4">
                <div class="card shadow-sm h-100">
                    <div class="card-body d-flex flex-column">
                        <h6 class="card-title mb-3">📁 ARCHIVOS</h6>
                        <div class="mb-3">
                            <label class="form-label small">CSV Ausencias <span class="text-danger">*</span></label>
                            <input type="file" id="archivo-ausencias" class="form-control" accept=".csv">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small">Sueldos (opcional)</label>
                            <input type="file" id="archivo-sueldos" class="form-control" accept=".csv,.xlsx,.xls">
                        </div>
                        <button class="btn btn-dark mt-auto w-100" onclick="calcular()">
                            Calcular
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tabla resultados -->
        <div class="card shadow-sm">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-3">
    <h6 class="card-title mb-0">👥 LISTADO DE AGENTES</h6>
    <div class="d-flex gap-2">
        <input type="text" id="buscador" class="form-control form-control-sm" placeholder="Buscar..." style="width: 200px">
        <button class="btn btn-sm btn-outline-secondary" onclick="limpiar()">Limpiar cálculo</button>
    </div>
    </div>
                <div id="grid-resultados" class="ag-theme-balham"></div>
            </div>
        </div>
    </div>
    <!-- SECCIÓN REGLAS (placeholder) -->
    <div id="seccion-reglas" style="display:none">
        <div class="page-title">
            <h5 class="mb-0">⚙️ REGLAS DE AUSENCIAS</h5>
        </div>
        <div class="card shadow-sm">
            <div class="card-body text-center text-muted py-5">
                Próximamente
            </div>
        </div>
    </div>

</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/ag-grid-community@31.0.0/dist/ag-grid-community.min.js"></script>
<script src="presentismo.js"></script>

</body>
</html>
