<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Presentismo</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- DataTables -->
    <link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    <!-- DataTables Buttons -->
    <link href="https://cdn.datatables.net/buttons/2.4.1/css/buttons.bootstrap5.min.css" rel="stylesheet">

    <style>
    body {
        font-family: 'Inter', 'Segoe UI', sans-serif;
        background-color: #f8f9fa;
        font-size: 0.82rem;
    }
    .sidebar {
        width: 200px;
        min-height: 100vh;
        background-color: #1a2035;
        position: fixed;
        top: 0; left: 0;
    }
    .sidebar .nav-link {
        color: #adb5bd;
        padding: 10px 20px;
        font-size: 0.82rem;
    }
    .sidebar .nav-link.active {
        color: #fff;
        background-color: #0d6efd;
        border-radius: 6px;
        margin: 0 10px;
    }
    .sidebar .logo {
        color: #fff;
        font-weight: bold;
        padding: 18px 20px;
        font-size: 0.9rem;
        border-bottom: 1px solid #2d3a5a;
    }
    .main-content {
        margin-left: 200px;
        padding: 20px 25px;
    }
    .page-title {
        background: linear-gradient(135deg, #1a2035, #2d3a5a);
        color: white;
        padding: 12px 20px;
        border-radius: 8px;
        margin-bottom: 20px;
        font-size: 0.85rem;
    }
    .badge-ok      { background-color: #198754; color: white; padding: 2px 8px; border-radius: 20px; font-size: 0.7rem; }
    .badge-revisar { background-color: #ffc107; color: black; padding: 2px 8px; border-radius: 20px; font-size: 0.7rem; }
    .badge-fe      { background-color: #dc3545; color: white; padding: 2px 7px; border-radius: 20px; font-size: 0.65rem; }
    .badge-cmj     { background-color: #6f42c1; color: white; padding: 2px 7px; border-radius: 20px; font-size: 0.65rem; }
    .btn-ver {
        background-color: #0d6efd;
        border: none;
        color: white;
        padding: 2px 10px;
        border-radius: 4px;
        font-size: 0.72rem;
        cursor: pointer;
    }
    .btn-ver:hover { background-color: #0b5ed7; }
    table.dataTable tbody tr { font-size: 0.78rem; }
    table.dataTable tbody tr:hover { background-color: #e8f0fe !important; }
    table.dataTable tbody td { white-space: nowrap; padding: 5px 10px !important; vertical-align: middle !important; }
    table.dataTable thead th { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.04em; padding: 8px 10px !important; }
    .dataTables_wrapper .dataTables_filter input { font-size: 0.8rem; }
    .dataTables_wrapper .dataTables_length select { font-size: 0.8rem; }
    .dataTables_wrapper .dataTables_info { font-size: 0.75rem; }
    .dataTables_wrapper .dataTables_paginate { font-size: 0.8rem; }
    .dt-buttons .btn { font-size: 0.75rem; padding: 3px 8px; }
    .card { border: none; box-shadow: 0 1px 4px rgba(0,0,0,0.08) !important; }
    .card-title { font-size: 0.82rem; font-weight: 600; }
    .form-label { font-size: 0.75rem; }
    .form-control { font-size: 0.82rem; }
</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar d-flex flex-column">
    <div class="logo">⚡ Presentismo</div>
    <nav class="nav flex-column mt-3">
        <a href="#" class="nav-link active" onclick="mostrarSeccion('presentismo', this)">
            👥 Presentismo
        </a>
        <a href="#" class="nav-link" onclick="mostrarSeccion('reglas', this)">
            ⚙️ Reglas de Ausencias
        </a>
    </nav>
    <div class="mt-auto p-3">
        <a href="#" class="nav-link text-danger">↩ Salir</a>
    </div>
</div>

<!-- CONTENIDO PRINCIPAL -->
<div class="main-content">

    <!-- SECCIÓN PRESENTISMO -->
    <div id="seccion-presentismo">
        <div class="page-title">
            <h5 class="mb-0">⚡ PREMIO PRESENTISMO</h5>
        </div>

        <div class="row g-4 mb-4">
            <!-- Períodos -->
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h6 class="card-title mb-3">📅 SELECCIONAR PERÍODOS</h6>
                        <div class="mb-3">
                            <label class="form-label text-muted small">PERÍODO DE PRESENTISMO</label>
                            <div class="row g-2">
                                <div class="col">
                                    <input type="date" id="desde_pres" class="form-control" value="2026-01-01">
                                </div>
                                <div class="col">
                                    <input type="date" id="hasta_pres" class="form-control" value="2026-05-31">
                                </div>
                            </div>
                        </div>
                        <div>
                            <label class="form-label text-muted small">PERÍODO DE LIQUIDACIÓN</label>
                            <div class="row g-2">
                                <div class="col">
                                    <input type="date" id="desde_liq" class="form-control" value="2026-02-01">
                                </div>
                                <div class="col">
                                    <input type="date" id="hasta_liq" class="form-control" value="2026-02-28">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Archivos -->
            <div class="col-md-4">
                <div class="card shadow-sm h-100">
                    <div class="card-body d-flex flex-column">
                        <h6 class="card-title mb-3">📁 ARCHIVOS</h6>
                        <div class="mb-3">
                            <label class="form-label small">CSV Ausencias <span class="text-danger">*</span></label>
                            <input type="file" id="archivo-ausencias" class="form-control" accept=".csv">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small">Sueldos (opcional)</label>
                            <input type="file" id="archivo-sueldos" class="form-control" accept=".csv,.xlsx,.xls">
                        </div>
                        <button class="btn btn-dark mt-auto w-100" onclick="calcular()">
                            Calcular
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tabla resultados -->
        <div class="card shadow-sm">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h6 class="card-title mb-0">👥 LISTADO DE AGENTES</h6>
                    <button class="btn btn-sm btn-outline-secondary" onclick="limpiar()">Limpiar cálculo</button>
                </div>
                <table id="tabla-resultados" class="table table-hover table-sm w-100">
                    <thead>
                        <tr>
                            <th>CUIL</th>
                            <th>NOMBRE</th>
                            <th>DÍAS DESC.</th>
                            <th>%</th>
                            <th>ALERTAS</th>
                            <th>$ RRHH</th>
                            <th>$ SUELDOS</th>
                            <th>ESTADO</th>
                            <th>ACCIÓN</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- SECCIÓN REGLAS -->
    <div id="seccion-reglas" style="display:none">
        <div class="page-title">
            <h5 class="mb-0">⚙️ REGLAS DE AUSENCIAS</h5>
        </div>
        <div class="card shadow-sm">
            <div class="card-body text-center text-muted py-5">
                Próximamente
            </div>
        </div>
    </div>

</div>

<!-- Scripts -->
<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.1/js/dataTables.buttons.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.bootstrap5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.html5.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.print.min.js"></script>
<script src="presentismo.js"></script>

</body>
</html>
